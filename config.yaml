# ============================================================
# BatMUD CN - Web 客户端 + 翻译引擎 配置文件
# ============================================================

# ---- 远程 BatMUD 服务器 ----
server:
  host: batmud.bat.org
  port: 23

# ---- Web 服务器 (浏览器访问地址) ----
web:
  host: 127.0.0.1
  port: 8080

# ---- 百度大模型翻译 API ----
# 从 https://fanyi-api.baidu.com/ 获取
# 需开通"大模型文本翻译API"服务
baidu:
  app_id: "123456789"  # 替换为你的 App ID
  secret_key: "JQK1a2b3c4d5e6f7g8h9i0j"  # 替换为你的 Secret Key
  # 翻译模型: 'llm' 大模型翻译 | 'nmt' 机器翻译
  model_type: "llm"
  timeout: 15

# ---- 翻译设置 ----
translation:
  enabled: true
  cache_size: 2000
  cache_file: "translation_cache.db"   # SQLite 磁盘缓存，重启后保留
  min_chars: 4
  max_batch: 3

# ---- 日志 ----
logging:
  level: INFO
  file: ""
  show_translations: true
